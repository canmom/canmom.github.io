comment: >-
  four years. the number that represents death... we don't get to see four years
  of rakka's life. we don't get to see the other side of the wall either.


  i do not believe in afterlives as such; i do have some belief in things that
  live in the mind, like tulpas and introjects and the like. or at least, the
  thought of such things helped in the immediate aftermath of losing her; that
  some fragment could be carried. it still does. but in imagining that ideal of
  carrying her forwards, i always struggled with how little i had known Fall
  when she was alive. that all i had to carry forward were such scattered
  fragments.


  there were things I felt I should do to honour her: I would help finish a
  scanlation project she had worked on, learn Japanese better, and so on. some
  of that sorta happened, i got a lot better at Japanese, but even that's kind
  of stalled. it's not that she told me to do those things. but they felt like
  concrete ways to continue, in some form, the process of her existence, if not
  her subjective experience. but i suppose we had to find other ways to continue
  to express what Fall meant to us in this life.


  as i write these words, I'm mourning mem, who also killed itself recently.
  it's all very hard... i don't know what else to say. i can only hope that
  against all odds, whatever Fall and mem found on the other side of that wall,
  it is more peaceful, more forgiving.


  oh, Fall... we love you. thank you for being here for a while, thank you for
  making us your friend.
