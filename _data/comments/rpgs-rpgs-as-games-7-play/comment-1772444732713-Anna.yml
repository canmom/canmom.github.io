comment: >-
  Hey there--


  Readin your work with fresh eyes after we talked a long time ago.  Your
  comment about modularity is interesting to me.  In many ways, game design is
  about taking little pieces and fitting them together in different ways. 
  however, fitting them together is just as important as the pieces themselves,
  no?  and sometimes moreso.  to use a coding metaphor, a lot of software
  engineering breakthroughs were people realizing that the same module applied
  at a different angle or in a different context could do very different
  things.  same with physics, which is a shared knowledge domain of ours.


  anyways, thanks for writin this.  hope your contributions to games continue
