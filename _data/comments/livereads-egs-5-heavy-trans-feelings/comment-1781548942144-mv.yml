comment: >-
  this is one of the most understandable things i have ever read. i pushed away
  everything feminine as a kid. my younger siblings were running around forcing
  each other to wear dresses and shit as a joke and i just wouldnt let myself be
  involved in any of that. i tried reading egs around the time that you would
  have written this, probably around the first time i realized i actually was
  some sort of gender queer. i think i only got about this far into the comic
  before putting it down. i wasn't ready for it. i wasn't ready for any of the
  things this comic would have forced me to think about. i get asked
  occasionally why im trans and you put it so well with "i am a trans girl
  because i choose to be, because i cannot accept being anything else", like
  yeah. that's the reason. nailed it there. 


  sometimes i fantasize about what it would have been like for me to grow up as
  a woman. i realized i was trans for the first time within a year of realizing
  that it was something that i could actually be. and then i spent 7 years
  shoving that feeling as far deep down as i could.


  i look back at my childhood before that point looking for anything. any signs.
  anything to show to any observers at the time that it was my destiny even then
  to transiton and i just dont see shit until middle school at the earliest.


  anyways. i get it. i get it. sorry.
