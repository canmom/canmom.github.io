comment: >-
  hi mv. thank you so much for commenting... it is really strange reading this
  piece of writing again now, we do not remember writing it! the version of us
  that wrote it has dissolved.


  ten years ago now. bloody hell.


  we feel quite differently about things today. we no longer feel any need for a
  'normal' cis childhood or a more 'legitimate' path to transitioning. perhaps
  accumulating a decade and change of quite definitively trans experiences helps
  on that front. in the present, we cannot really imagine existing as anything
  other than a (system of fragments generating personas of a) trans girl, and
  we've known enough different trans people with enough different backgrounds
  that the idea of a single 'expected' path to figuring out trans shit doesn't
  really have much force anymore. also we ended up plural lmao so that's a whole
  extra layer.


  for anyone reading this in the present: you can literally just be trans. you
  don't have to justify it. never, ever. if you want to, that is already the
  proof.


  you may be interested in reading some other writing on this site, such as
  [self-exciting gender
  instability](https://canmom.art/theory/self-exciting-gender-instability) and
  [this is also a move](https://canmom.art/theory/also-a-move), which addresses
  this kind of question. transitioning is a process. whatever you bring with you
  going in, to change your 'I' function to say 'I am a woman' or anything else
  will profoundly affect the way you evolve in the future. self-definition is a
  magic power that every human possesses, because every 'self' is a fiction
  upheld by your brain's incredible world simulation engine.


  and for what it's worth, reader, if you are in the place that we were in 10
  years ago: transing proved to be one of the best things we ever did. for all
  the pain it has caused, it has been absolutely, unequivocally worth it. we
  would not want any other life. this is the one we chose and nobody can take
  that from us.


  you don't have to change your body but if you think that'd be cool,
  [diyhrt.info](https://diyhrt.info/) is a good source. godspeed, sister
