comment: >-
  Welcome back!!! I'm really happy that the comments are appreciated, Umineko is
  really special and dear to me and honestly this is one of my favorite
  live-reads, its been a joy to read through to the point that I absolutely did
  post that comment while rereading it hehe :)


  Actually, I appreciate the whole canmom blog in general, its lovely (and even
  a little nostalgic?) to just see someone posting thoughts and essays with that
  more... I'm not totally sure how to describe it, personal feel I guess? Like
  it feels like a lot of what people put on the internet these days has an
  implicit audience and exists in the shadow of algorithmic ranking systems and
  metrics, where being more popular is "better" in some way? 


  So I very much treasure finding and reading stuff that feels like it was
  written just for the sake of writing, for the joy or catharsis of it; or just
  that feeling of "I NEED to talk about this or I will lose it." Even when I
  know very little about some of the other topics written about here, the
  sincerity and passion for the subjects is more than enough to make it a
  meaningful read... Makes me want to host my own blog too honestly?


  Anyway, yeah, to get back on topic, Natsuhi really DOES need to get out of
  that closet ASAP, the comphet on that poor woman is craazy. I'm not saying
  she's straight-up a lesbian, but there's no way she wouldn't date a girl or
  two while keeping Krauss as her findom side boy if she knew it was an option.
  Like, all the women in Umineko are really interesting (to my mind at least!)
  and unique explorations of the ways patriarchy affects us all and the
  different ways women can struggle and try to adapt to living under it, but I
  honestly think she's one of the most tragic? 


  She's married into the family with little or no say in the matter, and once
  there her status is essentially "the most important one of the servants, but
  we frankly trust some of them more (coughgenjicough)". She works miserably
  hard to the point of constant stress headaches, managing the entire rather
  extensive household, on the job training for the orphans that Kinzo seemingly
  randomly decided should work there as a charity case, raising and educating
  Jessica to step into her role someday, presumably a great deal of work hosting
  business guests and the like, and, oh yeah, seemingly doing Krauss' entire job
  for him on top of that??? She has no friends or peers that we can see, the
  only person approaching a peer she can honestly confide is her useless,
  unsympathetic husband, and half her in-laws actively hate her on top of that.


  And despite all that she seems to honestly believe that the work she's doing
  is meaningful and valuable, that the Ushiromiya family name is worthy of all
  of her suffering, that the role she's been told her entire life is hers is
  important and meaningful despite the complete lack of respect she gets for
  performing it. And I can't help but think that yeah, there's no wonder she
  believes that, for its literally all she has. What choice does she have but to
  believe in it? How cruel it would be, to go up to this woman and tell her that
  she wasted her life for nothing, that she should have been more feminist and
  refused to marry Krauss and run away or something. Is it any wonder that
  despite the narrative being decidedly sympathetic to the younger servants, the
  people who suffer the most for Natsuhi's failings and shortcomings, its still
  sympathetic to her as well?


  Excited as always for you(y'all?) to read further, im glad if my comments
  could provide some motivation, and please don't worry about taking time
  whenever y'all need :) I'm personally just happy to see other people enjoying
  such an important piece of literature to me u know?
